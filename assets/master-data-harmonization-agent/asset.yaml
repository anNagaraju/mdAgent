apiVersion: asset.sap/v1
kind: Asset

metadata:
  name: master-data-harmonization-agent
  version: 1.0.0
  description: AI agent that profiles, detects duplicates, harmonizes, and merges master data records via SAP Business Partner APIs

type: agent

container:
  buildPath: .
  port: 5000

requires:
  - name: business-partner-mcp-demo
    kind: mcp-server
    ordId: sap.mcpbuilder:apiResource:business_partner_mcp_demo:v1

probes:
  startup:
    path: /.well-known/agent.json
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 18
  liveness:
    path: /.well-known/agent.json
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /.well-known/agent.json
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
